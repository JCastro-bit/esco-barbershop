<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="20" fill="#000000"/>
  <!-- Barber pole stripes - barbería moderna -->
  <g transform="translate(64,64)">
    <!-- Pole body -->
    <rect x="-14" y="-36" width="28" height="72" rx="14" fill="#1A1A1A" stroke="#39FF14" stroke-width="2"/>
    <!-- Diagonal stripes -->
    <clipPath id="pole">
      <rect x="-13" y="-35" width="26" height="70" rx="13"/>
    </clipPath>
    <g clip-path="url(#pole)">
      <line x1="-20" y1="-30" x2="20" y2="-10" stroke="#39FF14" stroke-width="5"/>
      <line x1="-20" y1="-14" x2="20" y2="6" stroke="#39FF14" stroke-width="5"/>
      <line x1="-20" y1="2" x2="20" y2="22" stroke="#39FF14" stroke-width="5"/>
      <line x1="-20" y1="18" x2="20" y2="38" stroke="#39FF14" stroke-width="5"/>
    </g>
    <!-- Top cap -->
    <circle cx="0" cy="-36" r="8" fill="#39FF14"/>
    <!-- Bottom cap -->
    <circle cx="0" cy="36" r="8" fill="#39FF14"/>
  </g>
</svg>
